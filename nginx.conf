user root;

# 事件模块配置
events {
    worker_connections 1024;  # 合理的默认值，可根据服务器配置调整
}

# HTTP 核心配置
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # 安全配置
    # 速率限制
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
    
    # 安全响应头（全局配置）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), camera=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), speaker=(), sync-xhr=(), usb=(), vr=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    include /etc/nginx/conf.d/*.conf;

    # ========== HTTPS 主站点配置 (443 端口) ==========
    server {
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;
        
        # 支持主域名和 www 子域名
        server_name gznfpc.cn www.gznfpc.cn;

        listen 443 ssl;
        listen [::]:443 ssl;

        # SSL 证书配置（Certbot 管理）
        ssl_certificate /etc/letsencrypt/live/gznfpc.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gznfpc.cn/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # 只允许指定域名访问，其他域名直接拒绝
        if ($host !~ "^(gznfpc.cn|www.gznfpc.cn)$") {
            return 444;
        }

        # API 接口代理
        location /api/ {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://localhost:8000/api/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # WebSocket 代理
        location /ws/ {
            proxy_pass http://localhost:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 静态资源配置（带缓存优化）
        location /images/ {
            alias /root/WebFont/pc-declaration-system/src/images/;
            expires max;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /Video/ {
            alias /root/WebFont/Video/;
            expires max;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /book/ {
            alias /root/WebFont/book/;
            expires max;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /css/ {
            alias /root/WebFont/pc-declaration-system/src/css/;
            expires max;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /js/ {
            alias /root/WebFont/pc-declaration-system/src/js/;
            expires max;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /vendor/ {
            alias /root/WebFont/pc-declaration-system/src/vendor/;
            expires max;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # HTML 文件访问
        location ~*\.html$ {
            root /root/WebFont/pc-declaration-system/src/html;
            expires 1d;  # HTML 缓存 1 天，兼顾缓存和更新
            add_header Cache-Control "public";
        }

        # 根路径重定向到登录页
        location / {
            return 302 https://$host/login.html;
        }

        # Django 静态文件
        location /static/ {
            alias /root/WebServer/NanFangCollegePC/staticfiles/;
            expires 7d;
            access_log off;
        }

        # Django 后台管理
        location /admin/ {
            limit_req zone=mylimit burst=10 nodelay;
            proxy_pass http://localhost:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # 微信验证文件（兼容根路径和 /txt/ 路径）
        location = /txt/MP_verify_dQ4fIlJgl5JUtRpN.txt {
            alias /root/WebFont/txt/MP_verify_dQ4fIlJgl5JUtRpN.txt;
        }
        location = /MP_verify_dQ4fIlJgl5JUtRpN.txt {
            alias /root/WebFont/txt/MP_verify_dQ4fIlJgl5JUtRpN.txt;
        }

        # Certbot 证书续期验证
        location /.well-known/acme-challenge/ {
            root /root/WebFont/pc-declaration-system/src/html;
            default_type text/plain;
            try_files $uri =404;
        }
    }

    # ========== HTTP 重定向到 HTTPS (80 端口) ==========
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        # 匹配所有可能的访问域名/IP，防止漏匹配
        server_name gznfpc.cn www.gznfpc.cn localhost _;

        # Certbot 证书续期验证
        location /.well-known/acme-challenge/ {
            root /root/WebFont/pc-declaration-system/src/html;
            default_type text/plain;
            try_files $uri =404;
        }

        # 微信验证文件（兼容根路径和 /txt/ 路径）
        location = /txt/MP_verify_dQ4fIlJgl5JUtRpN.txt {
            alias /root/WebFont/txt/MP_verify_dQ4fIlJgl5JUtRpN.txt;
        }
        location = /MP_verify_dQ4fIlJgl5JUtRpN.txt {
            alias /root/WebFont/txt/MP_verify_dQ4fIlJgl5JUtRpN.txt;
        }

        # 所有其他请求强制重定向到 HTTPS（301 永久重定向）
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========== NAS 子域名配置 (80 端口）==========
    server {
        server_name nas.gznfpc.cn;
        listen 80;
        client_max_body_size 0;  # 取消上传大小限制
        
        location / {
            proxy_pass http://127.0.0.1:30003/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        location /app/qb/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /app/lucky/ {
            proxy_pass http://127.0.0.1:8081/f5905/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
        # ========== API 子域名配置 (HTTPS 443 端口) ==========
    server {
        server_name api.gznfpc.cn;
        listen 443 ssl;
        listen [::]:443 ssl;

        # SSL 证书配置
        ssl_certificate /etc/letsencrypt/live/gznfpc.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gznfpc.cn/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # 访问日志
        access_log /var/log/nginx/ip-location-api.access.log main;
        error_log /var/log/nginx/ip-location-api.error.log warn;

        # Gzip 压缩
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
        gzip_min_length 1000;

        # Next.js 静态资源缓存（1年）
        location /_next/static {
            proxy_pass http://127.0.0.1:30005;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # 后端 API 服务（只代理 /api/v1/ 路径，其他 /api/* 路径走前端）
        location /api/v1/ {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://127.0.0.1:30004/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # 反向代理到 Next.js 应用（前端页面）
        location / {
            proxy_pass http://127.0.0.1:30005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Certbot 证书续期验证
        location /.well-known/acme-challenge/ {
            root /root/WebFont/pc-declaration-system/src/html;
            default_type text/plain;
            try_files $uri =404;
        }
    }

    # ========== API 子域名配置 (HTTP 80 端口) ==========
    server {
        server_name api.gznfpc.cn;
        listen 80;
        listen [::]:80;

        # Certbot 证书续期验证
        location /.well-known/acme-challenge/ {
            root /root/WebFont/pc-declaration-system/src/html;
            default_type text/plain;
            try_files $uri =404;
        }

        # 重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
}